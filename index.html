<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen of Swords Experiment Cards</title>
    <meta name="description" content="25 experiments to try with AI. Draw a card. Try something. See what happens.">

    <!-- Open Graph -->
    <meta property="og:title" content="Queen of Swords Experiment Cards">
    <meta property="og:description" content="25 experiments to try with AI. Draw a card. Try something. See what happens.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://static1.squarespace.com/static/6999f1af05e7390427eb3a8b/t/69a32cdd9df9c33ba1ead3c6/1772301533784/Queen+of+Swords_social+image.png?format=1500w">

    <!-- React 18.3.1 (vendored locally — no runtime CDN dependency) -->
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>

    <!-- Tailwind: prebuilt static CSS (was the runtime cdn.tailwindcss.com script) -->
    <link rel="stylesheet" href="./assets/tailwind.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* Parafina Medium — Large optical size (headlines) */
        @font-face {
            font-family: 'Parafina';
            src: url('./fonts/Parafina-MediumL.woff2') format('woff2'),
                 url('./fonts/Parafina-MediumL.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        /* Parafina Medium — Medium optical size (card titles) */
        @font-face {
            font-family: 'Parafina-Medium';
            src: url('./fonts/Parafina-MediumM.woff2') format('woff2'),
                 url('./fonts/Parafina-MediumM.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --aether: #F5F5F5;
            --void: #000000;
            --vision: #6420E5;
            --pulse: #EF4C31;
            --sanctuary: #859148;
            --outlier: #FE63D9;
            --clarity: #549BA0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { min-height: 100vh; background: #000; }

        @keyframes stamp {
            0% { transform: scale(2) rotate(-20deg); opacity: 0; }
            40% { transform: scale(0.9) rotate(-8deg); opacity: 1; }
            60% { transform: scale(1.05) rotate(-14deg); opacity: 1; }
            100% { transform: scale(1) rotate(-12deg); opacity: 0.9; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .animate-stamp {
            animation: stamp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .animate-twinkle {
            animation: twinkle ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Prebuilt at deploy time from src JSX via Babel (see build notes). No runtime transpile. -->
    <script src="./assets/app.js"></script>
</body>
</html>
