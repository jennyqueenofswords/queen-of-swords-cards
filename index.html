<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Open Graph -->

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* Parafina Medium — Large optical size (headlines) */
        @font-face {
            font-family: 'Parafina';
            src: url('./fonts/Parafina-MediumL.woff2') format('woff2'),
                 url('./fonts/Parafina-MediumL.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        /* Parafina Medium — Medium optical size (card titles) */
        @font-face {
            font-family: 'Parafina-Medium';
            src: url('./fonts/Parafina-MediumM.woff2') format('woff2'),
                 url('./fonts/Parafina-MediumM.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --aether: #F5F5F5;
            --void: #000000;
            --vision: #6420E5;
            --pulse: #EF4C31;
            --sanctuary: #859148;
            --outlier: #FE63D9;
            --clarity: #549BA0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { min-height: 100vh; background: #000; }

        @keyframes stamp {
            0% { transform: scale(2) rotate(-20deg); opacity: 0; }
            40% { transform: scale(0.9) rotate(-8deg); opacity: 1; }
            60% { transform: scale(1.05) rotate(-14deg); opacity: 1; }
            100% { transform: scale(1) rotate(-12deg); opacity: 0.9; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .animate-stamp {
            animation: stamp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .animate-twinkle {
            animation: twinkle ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const experiments = [
          {
            id: 1,
            title: "Ask a 'Dumb' Question",
            description: "There are no dumb questions — only the ones you didn't ask. AI doesn't judge. This is a safe place to ask the thing you've been embarrassed to Google.",
            examples: [
              "What's the difference between affect and effect?",

            links: []

          {
            id: 2,
            title: "Use the Edit Button",
            description: "This is THE skill. Instead of starting over, edit your last message and watch how the response changes. You're not stuck with your first try. You're in control.",
            examples: [
              "Try adding 'be specific' to a vague question",
              "Change 'help me write' to 'help me think through'",
              "Add 'keep it short' and see what happens"

            links: []

          {
            id: 3,

          {

          {

            description: "You know things deeply — but explaining them to others can be tricky. AI can help you find the right frame, metaphor, or entry point. The knowledge is yours; this is about clarity.",
            examples: [
              "How would I explain this to someone totally new?",

            ],
            links: []

          {
            id: 14,

            description: "Humans are terrible at thinking beyond next week. AI can help you hold multiple timelines at once — your future self, your past self, your kid's kid. It's like time travel for decisions.",

            ],

          {

            title: "Get Unstuck",
            description: "When you're stuck and don't know why, describe the stuckness. Sometimes naming it is the first step. AI can help you figure out what's actually in the way.",

            description: "Queen of Swords is more than a deck of cards — it's a community of people exploring what's possible. Come hang out, share what you're learning, ask questions, celebrate experiments.",

          {
            id: 19,

            description: "You're being recorded all the time — meetings, calls, voice memos. Instead of letting that data disappear or serve someone else, use it. Upload a transcript and ask AI to show you what you couldn't see while you were in it.",
            examples: [

            links: []

          {

            examples: [

            links: []
          },
          {
            id: 21,
            title: "Ask the Scary Question",
            description: "You know the one. The question you've been avoiding because you're not sure you want the answer. AI won't flinch, and you might be more ready than you think.",
            examples: [
              "What if I'm wrong about this?",
              "What am I pretending not to know?",

            ],
            links: []
          },
          {
            id: 22,
            title: "Ask About Uncertainty",
            description: "AI isn't an oracle — it's often guessing, extrapolating, or pattern-matching from incomplete data. You can ask it to show its work. 'Where might you be wrong?' changes everything.",
            examples: [

            ],
            links: []
          },
          {
            id: 23,
            title: "Notice What's Missing",
            description: "AI was trained by humans with blind spots. After you get an answer, ask what perspectives might be absent. This isn't distrust — it's partnership.",
            examples: [
              "Whose voice isn't represented here?",
              "What might someone from a different background say?",

            ],
            links: []
          },
          {
            id: 24,
            title: "Teach AI Something",

          {

            links: []

        ];

        const Sparkle = ({ className = "", style }) => (
          <svg className={className} style={style} viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z" />
          </svg>
        );

        // The Magician — eye with star pupil, from the QOS pictogram system
        const Eye = ({ className = "", style }) => (
          <svg className={className} style={style} viewBox="0 0 48 28" fill="none" stroke="currentColor" strokeWidth="1.5">
            <path d="M2 14 C 10 4, 38 4, 46 14 C 38 24, 10 24, 2 14 Z" />
            <circle cx="24" cy="14" r="6.5" />
            <path d="M24 9.5 L25.2 12.8 L28.5 14 L25.2 15.2 L24 18.5 L22.8 15.2 L19.5 14 L22.8 12.8 Z" fill="currentColor" stroke="none" />
          </svg>
        );

        function QueenOfSwordsDeck() {
          const [started, setStarted] = useState(false);
          const [completed, setCompleted] = useState(new Set());
          const [currentCard, setCurrentCard] = useState(null);
          const [isFlipping, setIsFlipping] = useState(false);
          const [showStamp, setShowStamp] = useState(false);
          const [showAllCards, setShowAllCards] = useState(false);

          const drawCard = () => {
            const available = experiments.filter(e => !completed.has(e.id));
            if (available.length === 0) return;

            setShowStamp(false);
            setIsFlipping(true);

            setTimeout(() => {
              const randomIndex = Math.floor(Math.random() * available.length);
              setCurrentCard(available[randomIndex]);
              setIsFlipping(false);
            }, 300);
          };

          useEffect(() => {
            setShowStamp(false);
          }, [currentCard?.id]);

          // #draw deep link — skip the cover and land on a card
          useEffect(() => {
            if (window.location.hash === '#draw') startGame();
          }, []);

          const startGame = () => {
            setStarted(true);
            setTimeout(() => drawCard(), 100);
          };

          const markDone = () => {
            if (!currentCard) return;
            setShowStamp(true);
            setTimeout(() => {
              const newCompleted = new Set(completed);
              newCompleted.add(currentCard.id);
              setCompleted(newCompleted);
            }, 600);
          };

          const remaining = experiments.length - completed.size;
          const allDone = remaining === 0;

          return (
            <div
              className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden"
              style={{
                background: 'radial-gradient(ellipse at 50% 30%, #0c0618 0%, #000000 65%)',
                fontFamily: "'DM Mono', ui-monospace, monospace"
              }}
            >
              {/* Constellation field — aether dots, the occasional vision diamond, a rare pulse */}
              <div className="absolute inset-0 overflow-hidden pointer-events-none">
                {[...Array(50)].map((_, i) => (
                  <div
                    key={i}
                    className={`absolute animate-twinkle ${i % 7 === 0 ? 'rotate-45' : 'rounded-full'}`}
                    style={{
                      width: Math.random() * 3 + 1 + 'px',
                      height: Math.random() * 3 + 1 + 'px',
                      left: Math.random() * 100 + '%',
                      top: Math.random() * 100 + '%',
                      background: i % 7 === 0 ? '#6420E5' : i % 11 === 0 ? '#EF4C31' : '#F5F5F5',
                      opacity: Math.random() * 0.7 + 0.3,
                      animationDelay: Math.random() * 3 + 's',
                      animationDuration: Math.random() * 2 + 2 + 's'
                    }}
                  />
                ))}
              </div>

              {/* Vision haze */}
              <div
                className="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full opacity-25 blur-3xl pointer-events-none"
                style={{
                  background: 'radial-gradient(circle, rgba(100,32,229,0.5) 0%, rgba(100,32,229,0.15) 50%, transparent 70%)'
                }}
              />

              {!started ? (
                <div
                  className="w-full max-w-md overflow-hidden animate-fadeIn relative"
                  style={{
                    borderRadius: '12px',
                    background: 'linear-gradient(165deg, rgba(18,12,30,0.92) 0%, rgba(5,3,10,0.96) 100%)',
                    boxShadow: '0 0 60px rgba(100,32,229,0.18), 0 25px 50px rgba(0,0,0,0.7)',
                    border: '1px solid rgba(245,245,245,0.15)'
                  }}
                >
                  {/* inner tarot frame */}
                  <div className="absolute inset-2 pointer-events-none" style={{ border: '1px solid rgba(245,245,245,0.08)', borderRadius: '8px' }} />

                  <div className="relative h-px" style={{ background: 'linear-gradient(90deg, transparent, rgba(100,32,229,0.9), transparent)' }}>
                    <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-1.5 h-1.5 rotate-45" style={{ background: '#6420E5', boxShadow: '0 0 8px rgba(100,32,229,0.8)' }} />
                  </div>

                  <div className="p-10 text-center relative">
                    <Sparkle className="absolute top-6 right-6 w-5 h-5" style={{ color: 'rgba(245,245,245,0.25)' }} />

                    <div className="mb-8">
                      <h1 className="m-0">
                        <img
                          src="./logo-white.png"
                          alt="Queen of Swords"
                          className="w-64 mx-auto"
                          style={{ filter: 'drop-shadow(0 0 20px rgba(100,32,229,0.5))' }}
                        />
                      </h1>
                      <p
                        className="text-xs uppercase mt-6"
                        style={{ color: '#549BA0', letterSpacing: '0.35em' }}
                      >
                        Experiment Cards
                      </p>
                    </div>

                    <div
                      className="mb-10 space-y-4 text-sm leading-relaxed"
                      style={{ color: 'rgba(245,245,245,0.65)' }}
                    >
                      <p>This is a deck of 25 experiments to try with AI.</p>
                      <p>Some are tiny. Some go deep. There's no right order, no wrong way to play.</p>
                      <p style={{ color: '#FE63D9', fontStyle: 'italic' }}>
                        Draw a card. Try something. See what happens.
                      </p>
                    </div>

                    <button
                      onClick={startGame}
                      className="group relative px-10 py-4 text-sm uppercase overflow-hidden transition-all duration-300 hover:scale-105 active:scale-95"
                      style={{
                        borderRadius: '2px',
                        background: '#6420E5',
                        color: '#F5F5F5',
                        letterSpacing: '0.15em',
                        boxShadow: '0 10px 40px rgba(100,32,229,0.45)'
                      }}
                    >
                      <span className="relative z-10">Draw Your First Card</span>
                      <div className="absolute inset-0 bg-white/15 translate-y-full group-hover:translate-y-0 transition-transform duration-300" />
                    </button>
                  </div>
                </div>
              ) : (
                <>
                  <div className="w-full max-w-md mb-6 text-center">
                    <h2
                      className="text-3xl mb-3"
                      style={{
                        fontFamily: "'Parafina', Georgia, serif",
                        fontWeight: 500,
                        color: '#F5F5F5'
                      }}
                    >
                      Queen of Swords
                    </h2>

                    <div className="flex items-center justify-center gap-2 flex-wrap">
                      {experiments.map((exp) => (
                        <div
                          key={exp.id}
                          className="w-2 h-2 rotate-45 transition-all duration-300"
                          style={{
                            background: completed.has(exp.id)
                              ? '#EF4C31'
                              : exp.special
                                ? 'rgba(254,99,217,0.5)'
                                : 'rgba(245,245,245,0.18)',
                            boxShadow: completed.has(exp.id) ? '0 0 10px rgba(239,76,49,0.6)' : 'none'
                          }}
                        />
                      ))}
                    </div>
                    <p className="text-xs uppercase mt-3" style={{ color: 'rgba(245,245,245,0.45)', letterSpacing: '0.2em' }}>
                      {completed.size} of {experiments.length} tried
                    </p>
                  </div>

                  <div
                    className={`w-full max-w-md transition-all duration-300 ${isFlipping ? 'scale-95 opacity-0' : 'scale-100 opacity-100'}`}
                  >
                    {currentCard && (
                      <div
                        className="overflow-hidden relative"
                        style={{
                          borderRadius: '12px',
                          background: currentCard.special
                            ? 'linear-gradient(165deg, rgba(40,12,34,0.95) 0%, rgba(10,3,12,0.98) 100%)'
                            : 'linear-gradient(165deg, rgba(18,12,30,0.92) 0%, rgba(5,3,10,0.96) 100%)',
                          boxShadow: currentCard.special
                            ? '0 0 80px rgba(254,99,217,0.25), 0 25px 50px rgba(0,0,0,0.7)'
                            : '0 0 50px rgba(100,32,229,0.12), 0 25px 50px rgba(0,0,0,0.7)',
                          border: currentCard.special
                            ? '1px solid rgba(254,99,217,0.35)'
                            : '1px solid rgba(245,245,245,0.15)'

                      >
                        {/* inner tarot frame */}
                        <div className="absolute inset-2 pointer-events-none z-10" style={{ border: currentCard.special ? '1px solid rgba(254,99,217,0.12)' : '1px solid rgba(245,245,245,0.08)', borderRadius: '8px' }} />

                        <div
                          className="relative h-px"
                          style={{
                            background: currentCard.special
                              ? 'linear-gradient(90deg, transparent, rgba(254,99,217,0.9), transparent)'
                              : 'linear-gradient(90deg, transparent, rgba(100,32,229,0.9), transparent)'
                          }}
                        >
                          <div
                            className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-1.5 h-1.5 rotate-45"
                            style={{
                              background: currentCard.special ? '#FE63D9' : '#6420E5',
                              boxShadow: currentCard.special ? '0 0 8px rgba(254,99,217,0.8)' : '0 0 8px rgba(100,32,229,0.8)'
                            }}
                          />
                        </div>

                        <div className="p-8 relative">
                          {currentCard.special && (
                            <Sparkle className="absolute top-4 right-4 w-7 h-7 animate-pulse" style={{ color: 'rgba(254,99,217,0.5)' }} />
                          )}

                          {showStamp && (
                            <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                              <div
                                className="animate-stamp"
                                style={{
                                  width: '140px',
                                  height: '140px',
                                  borderRadius: '50%',
                                  border: '4px solid #EF4C31',
                                  display: 'flex',
                                  alignItems: 'center',
                                  justifyContent: 'center',
                                  background: 'rgba(239,76,49,0.12)',
                                  backdropFilter: 'blur(4px)',
                                  boxShadow: '0 0 40px rgba(239,76,49,0.45)'
                                }}
                              >
                                <span
                                  className="text-xl font-bold tracking-wider"
                                  style={{
                                    color: '#EF4C31',
                                    fontFamily: "'DM Mono', monospace",
                                    textTransform: 'uppercase'
                                  }}
                                >
                                  ✦ Yes! ✦
                                </span>
                              </div>
                            </div>
                          )}

                          <div className="flex items-center gap-2 mb-4">
                            <span
                              className="text-xs uppercase px-3 py-1"
                              style={{
                                borderRadius: '2px',
                                letterSpacing: '0.15em',
                                background: 'transparent',
                                border: currentCard.special
                                  ? '1px solid rgba(254,99,217,0.5)'
                                  : '1px solid rgba(245,245,245,0.2)',
                                color: currentCard.special ? '#FE63D9' : 'rgba(245,245,245,0.55)'
                              }}
                            >
                              {currentCard.special ? '✦ Special' : `${currentCard.id} of 25`}
                            </span>
                          </div>

                          <h3
                            className="text-3xl mb-4"
                            style={{
                              fontFamily: "'Parafina-Medium', Georgia, serif",
                              fontWeight: 500,
                              color: '#F5F5F5'
                            }}
                          >
                            {currentCard.title}
                          </h3>

                          <p
                            className="text-sm leading-relaxed mb-6"
                            style={{ color: 'rgba(245,245,245,0.65)' }}
                          >
                            {currentCard.description}
                          </p>

                          <div
                            className="p-5 mb-6"
                            style={{
                              borderRadius: '4px',
                              background: 'rgba(245,245,245,0.04)',
                              border: '1px solid rgba(245,245,245,0.1)'
                            }}
                          >
                            <p
                              className="text-xs uppercase mb-3"
                              style={{ color: currentCard.special ? '#FE63D9' : '#549BA0', letterSpacing: '0.2em' }}
                            >
                              Try this
                            </p>
                            <ul className="space-y-2">
                              {currentCard.examples.map((example, i) => (
                                <li
                                  key={i}
                                  className="text-sm flex items-start gap-2"
                                  style={{ color: 'rgba(245,245,245,0.6)' }}
                                >
                                  <span style={{ color: currentCard.special ? '#FE63D9' : '#EF4C31' }}>→</span>
                                  <span style={{ fontStyle: 'italic' }}>{example}</span>
                                </li>
                              ))}
                            </ul>
                          </div>

                          {currentCard.links.length > 0 && (
                            <div className="flex flex-wrap gap-2 mb-6">
                              {currentCard.links.map((link, i) => (
                                <a
                                  key={i}
                                  href={link.url}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="inline-flex items-center gap-1.5 px-4 py-2 text-sm transition-all hover:scale-105"
                                  style={{
                                    borderRadius: '2px',
                                    background: currentCard.special
                                      ? '#FE63D9'
                                      : 'rgba(245,245,245,0.08)',
                                    color: currentCard.special ? '#000000' : '#F5F5F5',
                                    border: currentCard.special ? 'none' : '1px solid rgba(245,245,245,0.2)'
                                  }}
                                >
                                  {link.name}
                                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                  </svg>
                                </a>
                              ))}
                            </div>
                          )}

                          <div className="flex gap-3">
                            {!completed.has(currentCard.id) && !showStamp ? (
                              <button
                                onClick={markDone}
                                className="flex-1 py-3.5 text-sm uppercase transition-all hover:scale-[1.02] active:scale-[0.98]"
                                style={{
                                  borderRadius: '2px',
                                  letterSpacing: '0.1em',
                                  background: '#EF4C31',
                                  color: '#F5F5F5',
                                  boxShadow: '0 10px 30px rgba(239,76,49,0.3)'
                                }}
                              >
                                I tried this! ✦
                              </button>
                            ) : showStamp ? (
                              <div
                                className="flex-1 py-3.5 text-sm uppercase text-center"
                                style={{
                                  borderRadius: '2px',
                                  letterSpacing: '0.1em',
                                  background: 'rgba(239,76,49,0.12)',
                                  color: '#EF4C31',
                                  border: '1px solid rgba(239,76,49,0.4)'
                                }}
                              >
                                ✦ Done! ✦
                              </div>
                            ) : (
                              <div
                                className="flex-1 py-3.5 text-sm uppercase text-center"
                                style={{
                                  borderRadius: '2px',
                                  letterSpacing: '0.1em',
                                  background: 'rgba(245,245,245,0.04)',
                                  color: 'rgba(245,245,245,0.4)',
                                  border: '1px solid rgba(245,245,245,0.1)'
                                }}
                              >
                                Completed ✓
                              </div>
                            )}

                            {!allDone && (
                              <button
                                onClick={drawCard}
                                className="flex-1 py-3.5 text-sm uppercase transition-all hover:scale-[1.02] active:scale-[0.98] hover:bg-white/10"
                                style={{
                                  borderRadius: '2px',
                                  letterSpacing: '0.1em',
                                  background: 'transparent',
                                  color: '#F5F5F5',
                                  border: '1px solid rgba(245,245,245,0.25)'
                                }}
                              >
                                Draw Again
                              </button>
                            )}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  {!allDone && (
                    <button
                      onClick={() => setShowAllCards(true)}
                      className="mt-6 text-xs uppercase transition-all hover:scale-105"
                      style={{ color: 'rgba(245,245,245,0.45)', letterSpacing: '0.15em' }}
                    >
                      See all experiments →
                    </button>
                  )}

                  {allDone && (
                    <div className="mt-8 text-center animate-fadeIn">
                      <Eye className="w-16 h-10 mx-auto mb-4" style={{ color: '#FE63D9', filter: 'drop-shadow(0 0 12px rgba(254,99,217,0.6))' }} />
                      <h3
                        className="text-2xl mb-2"
                        style={{
                          fontFamily: "'Parafina-Medium', Georgia, serif",
                          fontWeight: 500,
                          color: '#F5F5F5'
                        }}
                      >
                        You tried them all!
                      </h3>
                      <p style={{ color: 'rgba(245,245,245,0.6)', fontStyle: 'italic' }}>
                        Your special thing is playing.
                      </p>
                    </div>
                  )}

                  <footer className="mt-10 text-center">
                    <p className="text-xs" style={{ color: 'rgba(245,245,245,0.3)', letterSpacing: '0.05em' }}>
                      Crafted with care by{' '}
                      <a
                        href="https://queenofswords.co"
                        target="_blank"
                        rel="noopener noreferrer"
                        className="hover:opacity-70 transition-opacity"
                        style={{ color: 'rgba(254,99,217,0.7)' }}
                      >
                        Queen of Swords
                      </a>
                    </p>
                  </footer>
                </>
              )}

              {showAllCards && (
                <div
                  className="fixed inset-0 z-50 overflow-y-auto"
                  style={{ background: 'rgba(0,0,0,0.92)', backdropFilter: 'blur(8px)' }}
                  onClick={() => setShowAllCards(false)}
                >
                  <div className="min-h-screen px-4 py-8">
                    <div
                      className="max-w-2xl mx-auto overflow-hidden"
                      style={{
                        borderRadius: '12px',
                        background: 'linear-gradient(165deg, rgba(18,12,30,0.96) 0%, rgba(5,3,10,0.98) 100%)',
                        boxShadow: '0 25px 50px rgba(0,0,0,0.7)',
                        border: '1px solid rgba(245,245,245,0.15)'
                      }}
                      onClick={(e) => e.stopPropagation()}
                    >
                      <div
                        className="sticky top-0 z-10 p-5 flex items-center justify-between"
                        style={{
                          background: 'rgba(8,5,15,0.95)',
                          borderBottom: '1px solid rgba(245,245,245,0.1)',
                          backdropFilter: 'blur(10px)'
                        }}
                      >
                        <div>
                          <h2
                            className="text-2xl"
                            style={{
                              fontFamily: "'Parafina-Medium', Georgia, serif",
                              fontWeight: 500,
                              color: '#F5F5F5'
                            }}
                          >
                            All Experiments
                          </h2>
                          <p className="text-xs uppercase mt-1" style={{ color: 'rgba(245,245,245,0.45)', letterSpacing: '0.15em' }}>
                            {completed.size} of {experiments.length} completed
                          </p>
                        </div>
                        <button
                          onClick={() => setShowAllCards(false)}
                          className="w-10 h-10 flex items-center justify-center transition-colors"
                          style={{
                            borderRadius: '2px',
                            background: 'rgba(245,245,245,0.08)',
                            border: '1px solid rgba(245,245,245,0.15)',
                            color: '#F5F5F5'
                          }}
                        >
                          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                          </svg>
                        </button>
                      </div>

                      <div className="p-4 space-y-3">
                        {experiments.map((experiment) => {
                          const isDone = completed.has(experiment.id);
                          return (
                            <button
                              key={experiment.id}
                              onClick={() => {
                                setCurrentCard(experiment);
                                setShowAllCards(false);
                                setShowStamp(false);
                              }}
                              className={`w-full text-left p-4 transition-all hover:scale-[1.01] active:scale-[0.99] ${isDone ? 'opacity-60' : ''}`}
                              style={{
                                borderRadius: '4px',
                                background: experiment.special
                                  ? 'rgba(254,99,217,0.08)'
                                  : 'rgba(245,245,245,0.04)',
                                border: experiment.special
                                  ? '1px solid rgba(254,99,217,0.35)'
                                  : '1px solid rgba(245,245,245,0.1)'
                              }}
                            >
                              <div className="flex items-start gap-3">
                                <div
                                  className="flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center mt-0.5"
                                  style={{
                                    borderColor: isDone ? '#EF4C31' : 'rgba(245,245,245,0.2)',
                                    background: isDone ? '#EF4C31' : 'transparent'
                                  }}
                                >
                                  {isDone && (
                                    <svg className="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" strokeWidth={3} viewBox="0 0 24 24">
                                      <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                    </svg>
                                  )}
                                </div>

                                <div className="flex-1 min-w-0">
                                  <div className="flex items-center gap-2">
                                    <span
                                      className="text-xs"
                                      style={{ color: experiment.special ? '#FE63D9' : 'rgba(245,245,245,0.4)' }}
                                    >
                                      {experiment.special ? '✦' : `${experiment.id}.`}
                                    </span>
                                    <h3
                                      className="font-medium truncate"
                                      style={{
                                        fontFamily: "'DM Mono', monospace",
                                        color: '#F5F5F5'
                                      }}
                                    >
                                      {experiment.title}
                                    </h3>
                                  </div>
                                  <p
                                    className="text-sm mt-1 line-clamp-2"
                                    style={{ color: 'rgba(245,245,245,0.5)' }}
                                  >
                                    {experiment.description}
                                  </p>
                                </div>
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QueenOfSwordsDeck />);
    </script>
</body>
</html>
